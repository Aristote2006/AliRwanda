<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background (optional - remove for transparent) -->
  <!-- <rect width="400" height="120" fill="#ffffff" rx="12"/> -->
  
  <!-- Icon/Logo Mark -->
  <g transform="translate(10, 20)">
    <!-- Shopping Bag Icon -->
    <path d="M30 10 L50 10 L55 70 L25 70 Z" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
    <path d="M35 10 C35 0, 45 0, 45 10" fill="none" stroke="#3B82F6" stroke-width="3"/>
    
    <!-- Rwanda Sun (representing Rwanda) -->
    <circle cx="40" cy="35" r="8" fill="#FBBF24"/>
    <line x1="40" y1="23" x2="40" y2="27" stroke="#FBBF24" stroke-width="2"/>
    <line x1="40" y1="43" x2="40" y2="47" stroke="#FBBF24" stroke-width="2"/>
    <line x1="28" y1="35" x2="32" y2="35" stroke="#FBBF24" stroke-width="2"/>
    <line x1="48" y1="35" x2="52" y2="35" stroke="#FBBF24" stroke-width="2"/>
  </g>
  
  <!-- Text: AliRwanda -->
  <g transform="translate(85, 0)">
    <text x="0" y="70" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#1E293B">
      Ali<tspan fill="#3B82F6">Rwanda</tspan>
    </text>
    <!-- Tagline -->
    <text x="5" y="95" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748B" letter-spacing="2">
      SHOP SMART, LIVE BETTER
    </text>
  </g>
</svg>
